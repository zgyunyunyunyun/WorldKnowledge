<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>认知宇宙 · 知识星系可视化</title>
<style>
:root {
  --bg: #000010;
  --text: #e8edf2;
  --text-secondary: #8b9db5;
  --text-muted: #5a6e85;
  --glass-bg: rgba(10, 15, 30, 0.9);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius: 14px;
  --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
  -webkit-user-select: none;
}

canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  z-index: 1;
}

/* Password Overlay */
.password-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, #0a0a2e 0%, #000010 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  transition: opacity 0.6s, visibility 0.6s;
}
.password-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.password-card {
  background: rgba(15, 20, 40, 0.85);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(100, 130, 255, 0.15);
  border-radius: var(--radius);
  padding: 48px 40px;
  width: 400px; max-width: 90vw;
  text-align: center;
  box-shadow: var(--shadow-lg), 0 0 60px rgba(99, 102, 241, 0.08);
}
.password-card .galaxy-icon {
  font-size: 48px; margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.password-card h1 {
  font-size: 26px; font-weight: 700;
  background: linear-gradient(135deg, #a5b4fc, #c4b5fd, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.password-card .subtitle {
  font-size: 14px; color: var(--text-muted); margin-bottom: 28px;
}
.password-card input {
  width: 100%; padding: 14px 16px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px; outline: none;
  text-align: center; letter-spacing: 4px;
  transition: 0.2s;
}
.password-card input:focus {
  border-color: rgba(99, 102, 241, 0.5);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
}
.password-card input.error {
  border-color: #ef4444;
  animation: shake 0.4s ease;
}
.password-card button {
  width: 100%; padding: 14px; margin-top: 16px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: 0.2s;
}
.password-card button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
}
.password-card .error-msg {
  color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 20px;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}
}

/* UI Overlay */
.ui-overlay {
  position: fixed; inset: 0;
  z-index: 10; pointer-events: none;
  display: flex; flex-direction: column;
  transition: opacity 0.5s;
}
.ui-overlay.hidden { opacity: 0; }

/* Top Bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  pointer-events: auto;
}
.top-bar .nav-btn {
  padding: 10px 18px;
  background: rgba(15, 20, 40, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  color: var(--text-secondary);
  font-size: 13px; cursor: pointer;
  transition: 0.2s; display: flex; align-items: center; gap: 6px;
  font-family: inherit;
}
.top-bar .nav-btn:hover {
  background: rgba(30, 40, 70, 0.8);
  color: var(--text);
  border-color: rgba(255, 255, 255, 0.2);
}
.top-bar .nav-btn.hidden { visibility: hidden; opacity: 0; }

.top-bar .view-title {
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, #a5b4fc, #e2e8f0);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  pointer-events: none;
}

.top-bar .top-actions {
  display: flex; gap: 10px;
}
.top-bar .action-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(15, 20, 40, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-secondary); font-size: 16px;
  cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.top-bar .action-btn:hover {
  background: rgba(30, 40, 70, 0.8);
  color: var(--text);
  border-color: rgba(255, 255, 255, 0.2);
}

/* Hint Text */
.hint-text {
  text-align: center;
  padding: 8px 20px;
  pointer-events: none;
}
.hint-text span {
  font-size: 13px; color: var(--text-muted);
  background: rgba(15, 20, 40, 0.6);
  backdrop-filter: blur(8px);
  padding: 6px 16px;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  transition: opacity 0.5s;
}

/* Bottom Legend */
.bottom-legend {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  z-index: 10; pointer-events: none;
  display: flex; gap: 20px;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-muted);
  background: rgba(15, 20, 40, 0.6);
  backdrop-filter: blur(8px);
  padding: 6px 12px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.06);
}
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* Detail Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; visibility: hidden;
  transition: 0.3s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }

.modal-card {
  background: rgba(15, 20, 40, 0.95);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  width: 620px; max-width: 92vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg), 0 0 80px rgba(99, 102, 241, 0.08);
  transform: translateY(12px);
  transition: transform 0.3s;
}
.modal-overlay.open .modal-card { transform: translateY(0); }

.modal-card::-webkit-scrollbar { width: 4px; }
.modal-card::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1); border-radius: 2px;
}

.modal-header {
  padding: 24px 28px 16px;
  display: flex; align-items: flex-start; justify-content: space-between;
  position: sticky; top: 0;
  background: rgba(15, 20, 40, 0.95);
  backdrop-filter: blur(24px);
  z-index: 2;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}
.modal-header .planet-info { display: flex; align-items: center; gap: 14px; }
.modal-header .planet-dot {
  width: 40px; height: 40px; border-radius: 50%;
  flex-shrink: 0; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
}
.modal-header h2 {
  font-size: 20px; font-weight: 700;
  line-height: 1.3;
}
.modal-header .breadcrumb {
  font-size: 12px; color: var(--text-muted);
  margin-top: 2px;
}
.modal-header .close-btn {
  width: 34px; height: 34px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 50%;
  color: var(--text-muted); font-size: 18px;
  cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.modal-header .close-btn:hover {
  background: rgba(255, 255, 255, 0.12);
  color: var(--text);
}

.modal-body { padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 18px; }
.modal-body .section { display: flex; flex-direction: column; gap: 6px; }
.modal-body .section-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.modal-body .section-label .label-icon { font-size: 14px; }
.modal-body .section-content {
  font-size: 14px; color: var(--text-secondary);
  line-height: 1.8;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 10px;
  padding: 14px 16px;
}

.modal-body .insight-box {
  background: rgba(99, 102, 241, 0.08);
  border: 1px solid rgba(99, 102, 241, 0.2);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px; line-height: 1.8;
  color: #c7d2fe;
  position: relative;
}
.modal-body .insight-box::before {
  content: '💡';
  position: absolute; top: -10px; left: 14px;
  font-size: 18px;
}

.modal-body .original-box {
  background: rgba(245, 158, 11, 0.06);
  border: 1px solid rgba(245, 158, 11, 0.15);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 13px; line-height: 1.7;
  color: #fcd34d;
  font-style: italic;
  position: relative;
}
.modal-body .original-box::before {
  content: '📜';
  position: absolute; top: -10px; left: 14px;
  font-size: 16px;
}

.modal-body .meta-row {
  display: flex; gap: 12px; flex-wrap: wrap;
}
.modal-body .meta-tag {
  padding: 4px 12px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 12px;
  font-size: 11px; color: var(--text-muted);
}

/* Mobile */
@media (max-width: 768px) {
  .top-bar { padding: 12px 12px; }
  .top-bar .nav-btn { padding: 8px 12px; font-size: 12px; }
  .top-bar .view-title { font-size: 14px; }
  .modal-card { max-width: 100vw; max-height: 100vh; border-radius: 0; }
  .modal-header { padding: 18px 16px 12px; }
  .modal-body { padding: 14px 16px 20px; }
  .bottom-legend { bottom: 14px; gap: 10px; }
  .legend-item { padding: 4px 10px; font-size: 10px; }
  .password-card { padding: 32px 24px; }
}
</style>
</head>
<body>

<!-- Password Overlay -->
<div class="password-overlay" id="passwordOverlay">
  <div class="password-card">
    <div class="galaxy-icon">🌌</div>
    <h1>认知宇宙</h1>
    <p class="subtitle">个人知识星系 · 让思考可视化</p>
    <input type="password" id="passwordInput"
           placeholder="输入访问密码" autocomplete="off"
           onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">🚀 探索宇宙</button>
    <div class="error-msg" id="passwordError"></div>
  </div>
</div>

<!-- UI Overlay -->
<div class="ui-overlay hidden" id="uiOverlay">
  <div class="top-bar">
    <button class="nav-btn hidden" id="btnBack" onclick="navigateBack()">
      ← 返回
    </button>
    <div class="view-title" id="viewTitle">认知宇宙</div>
    <div class="top-actions">
      <button class="action-btn" onclick="resetView()" title="回到总览">🏠</button>
      <a href="index.html" class="action-btn" title="表格视图" style="text-decoration:none;">📋</a>
    </div>
  </div>
  <div style="flex:1;"></div>
  <div class="hint-text">
    <span id="hintText">点击星系探索你的知识宇宙</span>
  </div>
</div>

<!-- Legend -->
<div class="bottom-legend" id="bottomLegend">
  <div class="legend-item"><span class="legend-dot" style="background:#6366f1;"></span> 星系</div>
  <div class="legend-item"><span class="legend-dot" style="background:#fbbf24;"></span> 恒星系</div>
  <div class="legend-item"><span class="legend-dot" style="background:#60a5fa;"></span> 知识点</div>
</div>

<!-- Planet Detail Modal -->
<div class="modal-overlay" id="planetModal">
  <div class="modal-card">
    <div class="modal-header">
      <div class="planet-info">
        <div class="planet-dot" id="modalPlanetDot"></div>
        <div>
          <h2 id="modalPlanetName"></h2>
          <div class="breadcrumb" id="modalBreadcrumb"></div>
        </div>
      </div>
      <button class="close-btn" onclick="closePlanetModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- dynamically filled -->
    </div>
  </div>
</div>

<canvas id="cosmosCanvas"></canvas>

              "insight": "连接是认知提升的加速器——把收入和思维模式放在一起看，才能看到完整图景。"
            },
            {

              "name": "协作者",
              "color": "#10b981",
              "size": 1.3,
              "orbit": 160,
              "speed": 0.65,
              "summary": "帮你把碎片组织成完整的知识结构",
              "analysis": "你现在看到的知识星系，就是我帮你把零散想法组织成结构化输出的结果。",
              "insight": "结构本身就有力量——它让混沌变得可导航。"
            },
            {
              "id": "role-mirror",
              "name": "镜子",
              "color": "#f59e0b",
              "size": 1.5,
              "orbit": 200,
              "speed": 0.5,
              "summary": "反映你自己没看见的模式和倾向",
              "analysis": "当你反复提到价值两个字时，镜子告诉你：价值是你最核心的关切，出现在收入、AI、盲区三个星系中。",
              "insight": "高频词汇就是内心罗盘——你的高频词是价值和普通人。"
            },
            {
              "id": "role-steward",
              "name": "管家",
              "color": "#ef4444",
              "size": 1.2,
              "orbit": 240,
              "speed": 0.4,
              "summary": "维护知识体系健康，更新内容、去重、保备份",
              "analysis": "每次你分享想法，管家就更新这个宇宙——添加星球、丰富内容、保持结构清晰。",
              "insight": "好的知识系统不需要你维护，它会自己在对话中成长。"
            }
          ]
        }
      ]

  ]
}
</script>

<script>
// ═══════ CONSTANTS ═══════
const PASSWORD_HASH = '2be5c06a2d1099790c688ade5200f416247643df64e344234cd5c5a613dbc42f';
const SESSION_KEY = 'cosmos_auth';

// ═══════ DATA ═══════
let cosmosData = null;

// ═══════ APP STATE ═══════
let currentView = 'universe';
let currentGalaxyIdx = -1;
let targetZoom = 0, currentZoom = 0;
let targetCamX = window.innerWidth/2, targetCamY = window.innerHeight/2;
let currentCamX = window.innerWidth/2, currentCamY = window.innerHeight/2;
let hoveredPlanet = null;
let mouseX = 0, mouseY = 0;
let galaxies = [];
let animTime = 0;
let bgStars = [];

// ═══════ CANVAS ═══════
const canvas = document.getElementById('cosmosCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth * window.devicePixelRatio;
  canvas.height = window.innerHeight * window.devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); recomputeGalaxyPositions(); });

// ═══════ PASSWORD ═══════
async function hashPassword(pw) {
  const d = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', d);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function unlock() {
  const input = document.getElementById('passwordInput');
  const errEl = document.getElementById('passwordError');
  const pw = input.value.trim();
  if (!pw) {
    errEl.textContent = '请输入密码';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }
  const hash = await hashPassword(pw);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem(SESSION_KEY, 'true');
    document.getElementById('passwordOverlay').classList.add('hidden');
    document.getElementById('uiOverlay').classList.remove('hidden');
    init();
  } else {
    errEl.textContent = '密码错误，请重试';
    input.classList.add('error');
    input.value = ''; input.focus();
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

// ═══════ INIT ═══════
async function init() {
  // 从内嵌 JSON script 加载（无 fetch 依赖，中文引号安全）
  try {
    const raw = document.getElementById('cosmos-data').textContent;
    cosmosData = JSON.parse(raw);
    console.log('✅ ' + cosmosData.galaxies.length + ' 个星系已加载');
  } catch(e) {
    console.error('数据解析失败', e);
    cosmosData = { galaxies: [] };
  }

  createBgStars();
  drawStaticBackground();
  recomputeGalaxyPositions();

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('click', onCanvasClick);
  canvas.addEventListener('touchstart', onTouchStart, {passive: false});

  requestAnimationFrame(loop);
}

function createBgStars() {
  bgStars = [];
  const w = window.innerWidth, h = window.innerHeight;
  for (let i = 0; i < 120; i++) {
    bgStars.push({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.4 + 0.15
    });
  }
}

function drawStaticBackground() {
  const w = window.innerWidth, h = window.innerHeight;
  const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.7);
  grad.addColorStop(0, '#08081e');
  grad.addColorStop(0.5, '#000012');
  grad.addColorStop(1, '#000006');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  bgStars.forEach(s => {
    ctx.fillStyle = 'rgba(200,210,255,' + s.a + ')';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
}

function recomputeGalaxyPositions() {
  if (!cosmosData || !cosmosData.galaxies.length) return;
  const w = window.innerWidth, h = window.innerHeight;
  const cx = w / 2, cy = h / 2;
  const count = cosmosData.galaxies.length;

  // 2x2 网格布局（4个星系）
  const positions = count === 4 ? [
    { x: cx - w*0.18, y: cy - h*0.16 },
    { x: cx + w*0.18, y: cy - h*0.16 },
    { x: cx - w*0.18, y: cy + h*0.16 },
    { x: cx + w*0.18, y: cy + h*0.16 }
  ] : cosmosData.galaxies.map((_, i) => {
    const angle = (i/count)*Math.PI*2 - Math.PI/2;
    const r = Math.min(w,h)*0.28;
    return { x: cx + Math.cos(angle)*r*0.75, y: cy + Math.sin(angle)*r*0.6 };
  });

  galaxies = cosmosData.galaxies.map((g, i) => {
    const pos = positions[i];
    return {
      ...g, x: pos.x, y: pos.y,
      radius: 80 + g.starSystems.length * 12,
      starSystems: g.starSystems.map((ss, si) => ({
        ...ss,
        orbitX: pos.x, orbitY: pos.y,
        angle: (si / g.starSystems.length) * Math.PI * 2,
        orbitRadius: 100 + si * 55
      }))
    };
  });
}

// ═══════ RENDER LOOP ═══════
function loop(timestamp) {
  animTime = timestamp * 0.001;

  currentZoom += (targetZoom - currentZoom) * 0.08;
  currentCamX += (targetCamX - currentCamX) * 0.08;
  currentCamY += (targetCamY - currentCamY) * 0.08;

  const w = window.innerWidth, h = window.innerHeight;

  drawStaticBackground();

  const zf = 1 + currentZoom;
  const tx = w/2 - currentCamX * zf;
  const ty = h/2 - currentCamY * zf;
  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(zf, zf);

  drawGalaxies();

  ctx.restore();

  canvas.style.cursor = (hoveredPlanet && currentView === 'galaxy') ? 'pointer' : 'default';
  requestAnimationFrame(loop);
}

// ═══════ DRAW GALAXIES ═══════
function drawGalaxies() {
  galaxies.forEach((g, gi) => {
    if (currentView === 'universe') drawGalaxyOverview(g, gi);
    else if (currentView === 'galaxy' && gi === currentGalaxyIdx) drawGalaxyDetail(g, gi);
  });
}

function drawGalaxyOverview(g, gi) {
  // 超大光晕
  const glow = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.radius*1.6);
  glow.addColorStop(0, g.color + '55');
  glow.addColorStop(0.3, g.color + '22');
  glow.addColorStop(0.7, g.color + '06');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(g.x, g.y, g.radius*1.6, 0, Math.PI*2); ctx.fill();

  // 旋臂粒子
  for (let i = 0; i < 35; i++) {
    const a = animTime*0.2 + (i/35)*Math.PI*2;
    const r = g.radius * (0.2 + (i%35)*0.035);
    const px = g.x + Math.cos(a)*r;
    const py = g.y + Math.sin(a)*r*0.6;
    ctx.fillStyle = g.color + '88';
    ctx.beginPath(); ctx.arc(px, py, 1.6, 0, Math.PI*2); ctx.fill();
  }

  // 星系核心（大而亮）
  const core = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.radius*0.85);
  core.addColorStop(0, '#ffffff');
  core.addColorStop(0.12, g.color);
  core.addColorStop(0.45, g.color + '77');
  core.addColorStop(0.8, g.color + '15');
  core.addColorStop(1, 'transparent');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(g.x, g.y, g.radius*0.85, 0, Math.PI*2); ctx.fill();

  // 标签
  const isHov = isInCircle(mouseX, mouseY, g.x, g.y, g.radius*0.85);
  ctx.fillStyle = 'rgba(255,255,255,' + (isHov?1:0.85) + ')';
  ctx.font = (isHov?'bold ':'') + '16px -apple-system, PingFang SC, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(g.name, g.x, g.y + g.radius + 24);

  const pCount = g.starSystems.reduce((s,ss) => s+ss.planets.length, 0);
  ctx.fillStyle = 'rgba(180,190,210,' + (isHov?0.8:0.55) + ')';
  ctx.font = '12px -apple-system, PingFang SC, sans-serif';
  ctx.fillText(g.starSystems.length + '个恒星系 · ' + pCount + '个知识点', g.x, g.y + g.radius + 44);

  // 悬停光环
  if (isHov) {
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5,5]);
    ctx.lineDashOffset = -animTime*30;
    ctx.beginPath(); ctx.arc(g.x, g.y, g.radius*1.1, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawGalaxyDetail(g, gi) {
  g.starSystems.forEach((ss, si) => {
    const sa = animTime*0.1 + ss.angle;
    const sx = ss.orbitX + Math.cos(sa)*ss.orbitRadius*0.25;
    const sy = ss.orbitY + Math.sin(sa)*ss.orbitRadius*0.25;

    // 轨道
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(ss.orbitX, ss.orbitY, ss.orbitRadius*0.25, 0, Math.PI*2); ctx.stroke();

    // 恒星
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 35);
    sg.addColorStop(0, ss.color||'#fbbf24');
    sg.addColorStop(0.5, (ss.color||'#fbbf24')+'55');
    sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(sx, sy, 35, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = ss.color||'#fbbf24';
    ctx.beginPath(); ctx.arc(sx, sy, 10, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = '13px -apple-system, PingFang SC, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ss.name, sx, sy + 42);

    // 行星
    ss.planets.forEach((p, pi) => {
      const pa = animTime*p.speed*0.5 + pi*(Math.PI*2/ss.planets.length);
      const pr = p.orbit*0.4;
      const px = sx + Math.cos(pa)*pr;
      const py = sy + Math.sin(pa)*pr*0.7;

      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.ellipse(sx, sy, pr, pr*0.7, 0, 0, Math.PI*2); ctx.stroke();

      const pg = ctx.createRadialGradient(px, py, 0, px, py, p.size*10);
      pg.addColorStop(0, p.color+'66');
      pg.addColorStop(1, 'transparent');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(px, py, p.size*10, 0, Math.PI*2); ctx.fill();

      const bg = ctx.createRadialGradient(px-p.size*0.3, py-p.size*0.3, p.size*0.1, px, py, p.size*3.5);
      bg.addColorStop(0, '#fff');
      bg.addColorStop(0.3, p.color);
      bg.addColorStop(1, p.color+'99');
      ctx.fillStyle = bg;
      ctx.beginPath(); ctx.arc(px, py, p.size*3.5, 0, Math.PI*2); ctx.fill();

      const ph = isInCircle(mouseX, mouseY, px, py, p.size*5);
      if (ph) {
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 2;
        ctx.setLineDash([3,3]);
        ctx.lineDashOffset = -animTime*20;
        ctx.beginPath(); ctx.arc(px, py, p.size*6, 0, Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.font = '12px -apple-system, PingFang SC, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, px, py - p.size*5 - 6);
      }
    });
  });

  // 星系标题
  if (g.starSystems.length > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 22px -apple-system, PingFang SC, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(g.name, g.x, g.y - g.starSystems[0].orbitRadius*0.25 - 55);
  }
}

// ═══════ HIT TEST ═══════
function isInCircle(px, py, cx, cy, r) {
  return (px-cx)*(px-cx)+(py-cy)*(py-cy) <= r*r;
}

function findGalaxyAt(mx, my) {
  for (let i=0; i<galaxies.length; i++) {
    if (isInCircle(mx,my,galaxies[i].x,galaxies[i].y,galaxies[i].radius*0.85)) return i;
  }
  return -1;
}

function findPlanetAt(mx, my) {
  if (currentGalaxyIdx<0) return null;
  const g = galaxies[currentGalaxyIdx];
  for (let si=0; si<g.starSystems.length; si++) {
    const ss = g.starSystems[si];
    const sa = animTime*0.1 + ss.angle;
    const sx = ss.orbitX + Math.cos(sa)*ss.orbitRadius*0.25;
    const sy = ss.orbitY + Math.sin(sa)*ss.orbitRadius*0.25;
    for (let pi=0; pi<ss.planets.length; pi++) {
      const p = ss.planets[pi];
      const pa = animTime*p.speed*0.5 + pi*(Math.PI*2/ss.planets.length);
      const pr = p.orbit*0.4;
      const px = sx + Math.cos(pa)*pr;
      const py = sy + Math.sin(pa)*pr*0.7;
      if (isInCircle(mx,my,px,py,p.size*5)) {
        return { galaxyIdx:currentGalaxyIdx, starSystemIdx:si, planetIdx:pi, planet:p, starSystem:ss, galaxy:g };
      }
    }
  }
  return null;
}

// ═══════ NAVIGATION ═══════
function zoomToGalaxy(gi) {
  if (!galaxies[gi]) return;
  currentGalaxyIdx = gi;
  const g = galaxies[gi];
  targetZoom = 3;
  targetCamX = g.x;
  targetCamY = g.y;
  currentView = 'galaxy';
  document.getElementById('btnBack').classList.remove('hidden');
  document.getElementById('viewTitle').textContent = g.name;
  document.getElementById('hintText').querySelector('span').textContent = '点击星球查看知识点详情';
}

function resetView() {
  currentView = 'universe';
  currentGalaxyIdx = -1;
  hoveredPlanet = null;
  targetZoom = 0;
  targetCamX = window.innerWidth / 2;
  targetCamY = window.innerHeight / 2;
  document.getElementById('btnBack').classList.add('hidden');
  document.getElementById('viewTitle').textContent = '认知宇宙';
  document.getElementById('hintText').querySelector('span').textContent = '点击星系探索你的知识宇宙';
  closePlanetModal();
}

function navigateBack() {
  if (currentView === 'galaxy') resetView();
}

// ═══════ PLANET MODAL ═══════
function openPlanetModal(pd) {
  var p = pd.planet, ss = pd.starSystem, g = pd.galaxy;
  document.getElementById('modalPlanetDot').style.background = 'radial-gradient(circle,'+p.color+','+p.color+'88)';
  document.getElementById('modalPlanetDot').style.boxShadow = '0 0 20px '+p.color+'44';
  document.getElementById('modalPlanetName').textContent = p.name;
  document.getElementById('modalBreadcrumb').textContent = g.name + ' \u203A ' + ss.name;

  var body =
    '<div class="section"><div class="section-label"><span class="label-icon">📝</span> 概述</div><div class="section-content">'+p.summary+'</div></div>'+
    '<div class="section"><div class="section-label"><span class="label-icon">🔍</span> 深度分析</div><div class="section-content">'+p.analysis+'</div></div>'+
    '<div class="insight-box">'+p.insight+'</div>'+
    '<div class="section"><div class="section-label"><span class="label-icon">💬</span> 原始记录</div><div class="original-box">'+p.originalText+'</div></div>'+
    '<div class="meta-row"><span class="meta-tag">🌌 '+g.name+'</span><span class="meta-tag">☀️ '+ss.name+'</span><span class="meta-tag" style="background:'+p.color+'22;border-color:'+p.color+'33;color:'+p.color+';">🪐 '+p.name+'</span></div>';

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('planetModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePlanetModal() {
  document.getElementById('planetModal').classList.remove('open');
  document.body.style.overflow = '';
}

// ═══════ EVENTS ═══════
function onMouseMove(e) {
  var r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
  if (currentView === 'galaxy') hoveredPlanet = findPlanetAt(mouseX, mouseY);
}

function onCanvasClick(e) {
  var r = canvas.getBoundingClientRect();
  var mx = e.clientX - r.left, my = e.clientY - r.top;
  if (currentView === 'universe') {
    var gi = findGalaxyAt(mx, my);
    if (gi>=0) zoomToGalaxy(gi);
  } else if (currentView === 'galaxy') {
    var f = findPlanetAt(mx, my);
    if (f) openPlanetModal(f);
    else if (galaxies[currentGalaxyIdx] && !isInCircle(mx,my,galaxies[currentGalaxyIdx].x,galaxies[currentGalaxyIdx].y,galaxies[currentGalaxyIdx].radius*2)) resetView();
  }
}

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length===1) {
    var r = canvas.getBoundingClientRect();
    mouseX = e.touches[0].clientX - r.left;
    mouseY = e.touches[0].clientY - r.top;
    if (currentView==='universe') { var gi = findGalaxyAt(mouseX,mouseY); if (gi>=0) zoomToGalaxy(gi); }
    else if (currentView==='galaxy') { var f = findPlanetAt(mouseX,mouseY); if (f) openPlanetModal(f); }
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') {
    if (document.getElementById('planetModal').classList.contains('open')) closePlanetModal();
    else if (currentView==='galaxy') resetView();
  }
});
document.getElementById('planetModal').addEventListener('click', function(e) { if (e.target===this) closePlanetModal(); });

// ═══════ AUTO INIT ═══════
if (sessionStorage.getItem(SESSION_KEY)==='true') {
  document.getElementById('passwordOverlay').classList.add('hidden');
  document.getElementById('uiOverlay').classList.remove('hidden');
  init();
}

console.log('🌌 认知宇宙就绪 — 4星系' + (cosmosData ? '已加载' : ''));
</script>
