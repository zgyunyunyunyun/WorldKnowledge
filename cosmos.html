<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>认知宇宙 · 知识星系可视化</title>
<style>
:root {
  --bg: #000010;
  --text: #e8edf2;
  --text-secondary: #8b9db5;
  --text-muted: #5a6e85;
  --glass-bg: rgba(10, 15, 30, 0.9);
  --glass-border: rgba(255, 255, 255, 0.08);
  --radius: 14px;
  --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
  -webkit-user-select: none;
}

canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  z-index: 1;
}

/* Password Overlay */
.password-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, #0a0a2e 0%, #000010 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  transition: opacity 0.6s, visibility 0.6s;
}
.password-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.password-card {
  background: rgba(15, 20, 40, 0.85);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(100, 130, 255, 0.15);
  border-radius: var(--radius);
  padding: 48px 40px;
  width: 400px; max-width: 90vw;
  text-align: center;
  box-shadow: var(--shadow-lg), 0 0 60px rgba(99, 102, 241, 0.08);
}
.password-card .galaxy-icon {
  font-size: 48px; margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.password-card h1 {
  font-size: 26px; font-weight: 700;
  background: linear-gradient(135deg, #a5b4fc, #c4b5fd, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.password-card .subtitle {
  font-size: 14px; color: var(--text-muted); margin-bottom: 28px;
}
.password-card input {
  width: 100%; padding: 14px 16px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px; outline: none;
  text-align: center; letter-spacing: 4px;
  transition: 0.2s;
}
.password-card input:focus {
  border-color: rgba(99, 102, 241, 0.5);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
}
.password-card input.error {
  border-color: #ef4444;
  animation: shake 0.4s ease;
}
.password-card button {
  width: 100%; padding: 14px; margin-top: 16px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: 0.2s;
}
.password-card button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
}
.password-card .error-msg {
  color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 20px;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}
}

/* UI Overlay */
.ui-overlay {
  position: fixed; inset: 0;
  z-index: 10; pointer-events: none;
  display: flex; flex-direction: column;
  transition: opacity 0.5s;
}
.ui-overlay.hidden { opacity: 0; }

/* Top Bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  pointer-events: auto;
}
.top-bar .nav-btn {
  padding: 10px 18px;
  background: rgba(15, 20, 40, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  color: var(--text-secondary);
  font-size: 13px; cursor: pointer;
  transition: 0.2s; display: flex; align-items: center; gap: 6px;
  font-family: inherit;
}
.top-bar .nav-btn:hover {
  background: rgba(30, 40, 70, 0.8);
  color: var(--text);
  border-color: rgba(255, 255, 255, 0.2);
}
.top-bar .nav-btn.hidden { visibility: hidden; opacity: 0; }

.top-bar .view-title {
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, #a5b4fc, #e2e8f0);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  pointer-events: none;
}

.top-bar .top-actions {
  display: flex; gap: 10px;
}
.top-bar .action-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(15, 20, 40, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-secondary); font-size: 16px;
  cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.top-bar .action-btn:hover {
  background: rgba(30, 40, 70, 0.8);
  color: var(--text);
  border-color: rgba(255, 255, 255, 0.2);
}

/* Hint Text */
.hint-text {
  text-align: center;
  padding: 8px 20px;
  pointer-events: none;
}
.hint-text span {
  font-size: 13px; color: var(--text-muted);
  background: rgba(15, 20, 40, 0.6);
  backdrop-filter: blur(8px);
  padding: 6px 16px;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  transition: opacity 0.5s;
}

/* Bottom Legend */
.bottom-legend {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  z-index: 10; pointer-events: none;
  display: flex; gap: 20px;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-muted);
  background: rgba(15, 20, 40, 0.6);
  backdrop-filter: blur(8px);
  padding: 6px 12px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.06);
}
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* Detail Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; visibility: hidden;
  transition: 0.3s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }

.modal-card {
  background: rgba(15, 20, 40, 0.95);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: var(--radius);
  width: 620px; max-width: 92vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg), 0 0 80px rgba(99, 102, 241, 0.08);
  transform: translateY(12px);
  transition: transform 0.3s;
}
.modal-overlay.open .modal-card { transform: translateY(0); }

.modal-card::-webkit-scrollbar { width: 4px; }
.modal-card::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1); border-radius: 2px;
}

.modal-header {
  padding: 24px 28px 16px;
  display: flex; align-items: flex-start; justify-content: space-between;
  position: sticky; top: 0;
  background: rgba(15, 20, 40, 0.95);
  backdrop-filter: blur(24px);
  z-index: 2;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}
.modal-header .planet-info { display: flex; align-items: center; gap: 14px; }
.modal-header .planet-dot {
  width: 40px; height: 40px; border-radius: 50%;
  flex-shrink: 0; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
}
.modal-header h2 {
  font-size: 20px; font-weight: 700;
  line-height: 1.3;
}
.modal-header .breadcrumb {
  font-size: 12px; color: var(--text-muted);
  margin-top: 2px;
}
.modal-header .close-btn {
  width: 34px; height: 34px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 50%;
  color: var(--text-muted); font-size: 18px;
  cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.modal-header .close-btn:hover {
  background: rgba(255, 255, 255, 0.12);
  color: var(--text);
}

.modal-body { padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 18px; }
.modal-body .section { display: flex; flex-direction: column; gap: 6px; }
.modal-body .section-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.modal-body .section-label .label-icon { font-size: 14px; }
.modal-body .section-content {
  font-size: 14px; color: var(--text-secondary);
  line-height: 1.8;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 10px;
  padding: 14px 16px;
}

.modal-body .insight-box {
  background: rgba(99, 102, 241, 0.08);
  border: 1px solid rgba(99, 102, 241, 0.2);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px; line-height: 1.8;
  color: #c7d2fe;
  position: relative;
}
.modal-body .insight-box::before {
  content: '💡';
  position: absolute; top: -10px; left: 14px;
  font-size: 18px;
}

.modal-body .original-box {
  background: rgba(245, 158, 11, 0.06);
  border: 1px solid rgba(245, 158, 11, 0.15);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 13px; line-height: 1.7;
  color: #fcd34d;
  font-style: italic;
  position: relative;
}
.modal-body .original-box::before {
  content: '📜';
  position: absolute; top: -10px; left: 14px;
  font-size: 16px;
}

.modal-body .meta-row {
  display: flex; gap: 12px; flex-wrap: wrap;
}
.modal-body .meta-tag {
  padding: 4px 12px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 12px;
  font-size: 11px; color: var(--text-muted);
}

/* Mobile */
@media (max-width: 768px) {
  .top-bar { padding: 12px 12px; }
  .top-bar .nav-btn { padding: 8px 12px; font-size: 12px; }
  .top-bar .view-title { font-size: 14px; }
  .modal-card { max-width: 100vw; max-height: 100vh; border-radius: 0; }
  .modal-header { padding: 18px 16px 12px; }
  .modal-body { padding: 14px 16px 20px; }
  .bottom-legend { bottom: 14px; gap: 10px; }
  .legend-item { padding: 4px 10px; font-size: 10px; }
  .password-card { padding: 32px 24px; }
}
</style>
</head>
<body>

<!-- Password Overlay -->
<div class="password-overlay" id="passwordOverlay">
  <div class="password-card">
    <div class="galaxy-icon">🌌</div>
    <h1>认知宇宙</h1>
    <p class="subtitle">个人知识星系 · 让思考可视化</p>
    <input type="password" id="passwordInput"
           placeholder="输入访问密码" autocomplete="off"
           onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">🚀 探索宇宙</button>
    <div class="error-msg" id="passwordError"></div>
  </div>
</div>

<!-- UI Overlay -->
<div class="ui-overlay hidden" id="uiOverlay">
  <div class="top-bar">
    <button class="nav-btn hidden" id="btnBack" onclick="navigateBack()">
      ← 返回
    </button>
    <div class="view-title" id="viewTitle">认知宇宙</div>
    <div class="top-actions">
      <button class="action-btn" onclick="resetView()" title="回到总览">🏠</button>
      <a href="index.html" class="action-btn" title="表格视图" style="text-decoration:none;">📋</a>
    </div>
  </div>
  <div style="flex:1;"></div>
  <div class="hint-text">
    <span id="hintText">点击星系探索你的知识宇宙</span>
  </div>
</div>

<!-- Legend -->
<div class="bottom-legend" id="bottomLegend">
  <div class="legend-item"><span class="legend-dot" style="background:#6366f1;"></span> 星系</div>
  <div class="legend-item"><span class="legend-dot" style="background:#fbbf24;"></span> 恒星系</div>
  <div class="legend-item"><span class="legend-dot" style="background:#60a5fa;"></span> 知识点</div>
</div>

<!-- Planet Detail Modal -->
<div class="modal-overlay" id="planetModal">
  <div class="modal-card">
    <div class="modal-header">
      <div class="planet-info">
        <div class="planet-dot" id="modalPlanetDot"></div>
        <div>
          <h2 id="modalPlanetName"></h2>
          <div class="breadcrumb" id="modalBreadcrumb"></div>
        </div>
      </div>
      <button class="close-btn" onclick="closePlanetModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- dynamically filled -->
    </div>
  </div>
</div>

<canvas id="cosmosCanvas"></canvas>

<script>
// ═══════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════
const PASSWORD_HASH = '2be5c06a2d1099790c688ade5200f416247643df64e344234cd5c5a613dbc42f';
const SESSION_KEY = 'cosmos_auth';

// ═══════════════════════════════════
//  DATA STORE
// ═══════════════════════════════════
let cosmosData = null;
let loading = true;

// ═══════════════════════════════════
//  APP STATE
// ═══════════════════════════════════
// view: 'universe' | 'galaxy' | 'starSystem'
let currentView = 'universe';
let currentGalaxyIdx = -1;
let currentStarSystemIdx = -1;
let targetZoom = 0;       // lerp target
let currentZoom = 0;
let targetCamX = 0, targetCamY = 0;
let currentCamX = 0, currentCamY = 0;
let hoveredPlanet = null; // {galaxyIdx, starSystemIdx, planetIdx}
let mouseX = 0, mouseY = 0;
let canvasW, canvasH;

// Animation
let starParticles = [];
let floatingParticles = [];
let galaxies = [];       // computed positions
let animTime = 0;

// ═══════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════
const canvas = document.getElementById('cosmosCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvasW = canvas.width = window.innerWidth * window.devicePixelRatio;
  canvasH = canvas.height = window.innerHeight * window.devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
resizeCanvas();

// 立即绘制初始星空（不等动画循环）
function drawInitialStars() {
  const w = window.innerWidth, h = window.innerHeight;
  const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(0.5, '#000015');
  grad.addColorStop(1, '#000008');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * w, y = Math.random() * h;
    const alpha = Math.random() * 0.6 + 0.3;
    ctx.fillStyle = `rgba(200,210,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, Math.random() * 2 + 0.5, 0, Math.PI*2);
    ctx.fill();
  }
}
drawInitialStars();
window.addEventListener('resize', () => {
  resizeCanvas();
  recomputeGalaxyPositions();
});

// ═══════════════════════════════════
//  PASSWORD
// ═══════════════════════════════════
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function unlock() {
  const input = document.getElementById('passwordInput');
  const errorEl = document.getElementById('passwordError');
  const password = input.value.trim();

  if (!password) {
    errorEl.textContent = '请输入密码';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }

  const hash = await hashPassword(password);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem(SESSION_KEY, 'true');
    document.getElementById('passwordOverlay').classList.add('hidden');
    document.getElementById('uiOverlay').classList.remove('hidden');
    init();
  } else {
    errorEl.textContent = '密码错误，请重试';
    input.classList.add('error');
    input.value = '';
    input.focus();
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

// ═══════════════════════════════════
//  INIT
// ═══════════════════════════════════
async function init() {
  // 优先从 JSON 文件加载最新数据
  let loadedFromFile = false;
  try {
    const resp = await fetch('cosmos-data.json');
    if (resp.ok) {
      cosmosData = await resp.json();
      loadedFromFile = true;
      console.log('✅ 已从 cosmos-data.json 加载数据');
    }
  } catch (e) {
    console.warn('⚠️ 无法加载 cosmos-data.json，使用内嵌数据');
  }

  // 回退：如果加载失败，用空数据保底，页面正常显示但不渲染星系
  if (!loadedFromFile || !cosmosData) {
    console.error('❌ 无法加载知识数据，请确保 cosmos-data.json 存在');
    cosmosData = { galaxies: [] };
  }

  initStars();
  recomputeGalaxyPositions();
  loading = false;

  // Mouse events
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('click', onCanvasClick);
  canvas.addEventListener('touchstart', onTouchStart, {passive: false});

  // 始终启动动画循环
  requestAnimationFrame(loop);
}

function initStars() {
  starParticles = [];
  const count = 400;
  for (let i = 0; i < count; i++) {
    starParticles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 2.2 + 0.5,
      twinkleSpeed: Math.random() * 0.015 + 0.003,
      twinkleOffset: Math.random() * Math.PI * 2,
      baseAlpha: Math.random() * 0.6 + 0.4
    });
  }
  // Floating dust
  floatingParticles = [];
  for (let i = 0; i < 80; i++) {
    floatingParticles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.4 + 0.15
    });
  }
}

function recomputeGalaxyPositions() {
  if (!cosmosData) return;
  const w = window.innerWidth;
  const h = window.innerHeight;
  const cx = w / 2, cy = h / 2;
  const count = cosmosData.galaxies.length;

  // Arrange galaxies in a spiral or grid depending on count
  galaxies = cosmosData.galaxies.map((g, i) => {
    const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
    const radius = Math.min(w, h) * 0.28;
    let gx, gy;
    if (count <= 2) {
      gx = cx + (i === 0 ? -1 : 1) * radius * 0.6;
      gy = cy;
    } else if (count === 3) {
      const angles = [-Math.PI / 2, Math.PI / 6, 5 * Math.PI / 6];
      gx = cx + Math.cos(angles[i]) * radius * 0.7;
      gy = cy + Math.sin(angles[i]) * radius * 0.7;
    } else {
      gx = cx + Math.cos(angle) * radius * 0.75;
      gy = cy + Math.sin(angle) * radius * 0.6;
    }
    return {
      id: g.id,
      name: g.name,
      color: g.color,
      glowColor: g.glowColor,
      x: gx, y: gy,
      radius: 65 + g.starSystems.length * 10,
      starSystems: g.starSystems.map((ss, si) => ({
        ...ss,
        orbitX: gx, orbitY: gy,
        angle: (si / g.starSystems.length) * Math.PI * 2,
        orbitRadius: 90 + si * 50
      }))
    };
  });
}

// ═══════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════
function loop(timestamp) {
  animTime = timestamp * 0.001;

  // Lerp camera
  currentZoom += (targetZoom - currentZoom) * 0.06;
  currentCamX += (targetCamX - currentCamX) * 0.06;
  currentCamY += (targetCamY - currentCamY) * 0.06;

  const w = window.innerWidth;
  const h = window.innerHeight;
  ctx.clearRect(0, 0, w, h);

  // Deep space gradient
  const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(0.5, '#000015');
  grad.addColorStop(1, '#000008');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Apply camera transform
  const zoomFactor = 1 + currentZoom;
  const scaleW = w * (zoomFactor - 1) / 2;
  const scaleH = h * (zoomFactor - 1) / 2;
  const tx = scaleW - currentCamX * currentZoom;
  const ty = scaleH - currentCamY * currentZoom;

  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(zoomFactor, zoomFactor);

  // Draw stars
  drawStars();

  // Draw galaxies
  if (cosmosData) {
    drawGalaxies();
  }

  // Draw floating dust
  drawFloatingDust();

  ctx.restore();

  // Cursor style
  if (hoveredPlanet && currentView === 'galaxy') {
    canvas.style.cursor = 'pointer';
  } else {
    canvas.style.cursor = 'default';
  }

  requestAnimationFrame(loop);
}

function drawStars() {
  starParticles.forEach(s => {
    const alpha = s.baseAlpha + Math.sin(animTime * s.twinkleSpeed * 60 + s.twinkleOffset) * 0.25;
    ctx.fillStyle = `rgba(200,210,255,${Math.max(0.05, alpha)})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawFloatingDust() {
  floatingParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < -20) p.x = window.innerWidth + 20;
    if (p.x > window.innerWidth + 20) p.x = -20;
    if (p.y < -20) p.y = window.innerHeight + 20;
    if (p.y > window.innerHeight + 20) p.y = -20;

    ctx.fillStyle = `rgba(180,190,255,${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawGalaxies() {
  galaxies.forEach((g, gi) => {
    if (currentView === 'universe') {
      drawGalaxyInUniverse(g, gi);
    } else if (currentView === 'galaxy' && gi === currentGalaxyIdx) {
      drawGalaxyExpanded(g, gi);
    }
  });
}

function drawGalaxyInUniverse(g, gi) {
  // Galaxy glow
  const glowGrad = ctx.createRadialGradient(g.x, g.y, g.radius * 0.2, g.x, g.y, g.radius * 1.4);
  glowGrad.addColorStop(0, g.glowColor || 'rgba(99,102,241,0.25)');
  glowGrad.addColorStop(0.5, 'rgba(99,102,241,0.06)');
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(g.x, g.y, g.radius * 1.4, 0, Math.PI*2);
  ctx.fill();

  // Galaxy body with spiral effect
  for (let i = 0; i < 12; i++) {
    const armAngle = (i / 12) * Math.PI * 2 + animTime * 0.15;
    const armLen = g.radius * (0.5 + Math.random() * 0.5);
    ctx.strokeStyle = `rgba(255,255,255,0.03)`;
    ctx.lineWidth = 1 + Math.random() * 2;
    ctx.beginPath();
    ctx.arc(g.x, g.y, g.radius * (0.3 + i * 0.06), armAngle, armAngle + 0.8);
    ctx.stroke();
  }

  // Galaxy core
  const coreGrad = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.radius * 0.7);
  coreGrad.addColorStop(0, g.color);
  coreGrad.addColorStop(0.4, g.color + '88');
  coreGrad.addColorStop(0.7, g.color + '22');
  coreGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(g.x, g.y, g.radius * 0.7, 0, Math.PI*2);
  ctx.fill();

  // Orbiting particles around galaxy
  for (let i = 0; i < 8; i++) {
    const orbitAngle = animTime * (0.3 + i * 0.1) + i * Math.PI / 4;
    const orbitR = g.radius * (0.6 + i * 0.06);
    const px = g.x + Math.cos(orbitAngle) * orbitR;
    const py = g.y + Math.sin(orbitAngle) * orbitR * 0.6;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(px, py, 1.5, 0, Math.PI*2);
    ctx.fill();
  }

  // Label
  const isHovered = isPointInCircle(mouseX, mouseY, g.x, g.y, g.radius * 0.7);
  const labelAlpha = isHovered ? 1 : 0.8;
  ctx.fillStyle = `rgba(255,255,255,${labelAlpha})`;
  ctx.font = `${isHovered ? 'bold ' : ''}15px -apple-system, "PingFang SC", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(g.name, g.x, g.y + g.radius + 22);

  const count = g.starSystems.reduce((sum, ss) => sum + ss.planets.length, 0);
  ctx.fillStyle = `rgba(180,190,210,${labelAlpha * 0.7})`;
  ctx.font = '11px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText(`${g.starSystems.length}恒星系 · ${count}知识点`, g.x, g.y + g.radius + 40);

  // Hover ring
  if (isHovered) {
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.lineDashOffset = -animTime * 30;
    ctx.beginPath();
    ctx.arc(g.x, g.y, g.radius * 0.9, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawGalaxyExpanded(g, gi) {
  // Draw all star systems
  g.starSystems.forEach((ss, si) => {
    const ssAngle = animTime * 0.12 + ss.angle;
    const sx = ss.orbitX + Math.cos(ssAngle) * ss.orbitRadius * 0.3;
    const sy = ss.orbitY + Math.sin(ssAngle) * ss.orbitRadius * 0.3;

    // Orbit ring
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(ss.orbitX, ss.orbitY, ss.orbitRadius * 0.3, 0, Math.PI*2);
    ctx.stroke();

    // Star core
    const starGlow = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30);
    starGlow.addColorStop(0, ss.color || '#fbbf24');
    starGlow.addColorStop(0.6, (ss.color || '#fbbf24') + '44');
    starGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = starGlow;
    ctx.beginPath();
    ctx.arc(sx, sy, 30, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = ss.color || '#fbbf24';
    ctx.beginPath();
    ctx.arc(sx, sy, 8, 0, Math.PI*2);
    ctx.fill();

    // Star system label
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '12px -apple-system, "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ss.name, sx, sy + 38);

    // Planets
    ss.planets.forEach((p, pi) => {
      const pAngle = animTime * p.speed * 0.5 + pi * (Math.PI * 2 / ss.planets.length);
      const pr = p.orbit * 0.35;
      const px = sx + Math.cos(pAngle) * pr;
      const py = sy + Math.sin(pAngle) * pr * 0.7;

      // Planet orbit
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.ellipse(sx, sy, pr, pr * 0.7, 0, 0, Math.PI*2);
      ctx.stroke();

      // Planet glow
      const planetGlow = ctx.createRadialGradient(px, py, 0, px, py, p.size * 9);
      planetGlow.addColorStop(0, p.color + '55');
      planetGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = planetGlow;
      ctx.beginPath();
      ctx.arc(px, py, p.size * 9, 0, Math.PI*2);
      ctx.fill();

      // Planet body
      const bodyGrad = ctx.createRadialGradient(px - p.size*0.3, py - p.size*0.3, p.size*0.1, px, py, p.size * 3);
      bodyGrad.addColorStop(0, '#ffffff');
      bodyGrad.addColorStop(0.3, p.color);
      bodyGrad.addColorStop(1, p.color + '88');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.arc(px, py, p.size * 3, 0, Math.PI*2);
      ctx.fill();

      // Hover effect
      const isHovered = isPointInCircle(mouseX, mouseY, px, py, p.size * 4);
      if (isHovered) {
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 2;
        ctx.setLineDash([3, 3]);
        ctx.lineDashOffset = -animTime * 20;
        ctx.beginPath();
        ctx.arc(px, py, p.size * 5, 0, Math.PI*2);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = '11px -apple-system, "PingFang SC", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, px, py - p.size * 4 - 6);
      }
    });
  });

  // Galaxy name
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = 'bold 20px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(g.name, g.x, g.y - g.starSystems[0].orbitRadius * 0.3 - 50);
}

// ═══════════════════════════════════
//  HIT TESTING
// ═══════════════════════════════════
function isPointInCircle(px, py, cx, cy, r) {
  const dx = px - cx;
  const dy = py - cy;
  return dx*dx + dy*dy <= r*r;
}

function findGalaxyAt(mx, my) {
  for (let i = 0; i < galaxies.length; i++) {
    const g = galaxies[i];
    if (isPointInCircle(mx, my, g.x, g.y, g.radius * 0.8)) {
      return i;
    }
  }
  return -1;
}

function findPlanetAt(mx, my) {
  if (currentGalaxyIdx < 0) return null;
  const g = galaxies[currentGalaxyIdx];
  for (let si = 0; si < g.starSystems.length; si++) {
    const ss = g.starSystems[si];
    const ssAngle = animTime * 0.12 + ss.angle;
    const sx = ss.orbitX + Math.cos(ssAngle) * ss.orbitRadius * 0.3;
    const sy = ss.orbitY + Math.sin(ssAngle) * ss.orbitRadius * 0.3;
    for (let pi = 0; pi < ss.planets.length; pi++) {
      const p = ss.planets[pi];
      const pAngle = animTime * p.speed * 0.5 + pi * (Math.PI * 2 / ss.planets.length);
      const pr = p.orbit * 0.35;
      const px = sx + Math.cos(pAngle) * pr;
      const py = sy + Math.sin(pAngle) * pr * 0.7;
      if (isPointInCircle(mx, my, px, py, p.size * 5)) {
        return { galaxyIdx: currentGalaxyIdx, starSystemIdx: si, planetIdx: pi, planet: p, starSystem: ss, galaxy: g };
      }
    }
  }
  return null;
}

// ═══════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════
function zoomToGalaxy(gi) {
  if (!galaxies[gi]) return;
  currentGalaxyIdx = gi;
  currentStarSystemIdx = -1;

  const g = galaxies[gi];
  const w = window.innerWidth;
  const h = window.innerHeight;
  const cx = w / 2, cy = h / 2;

  targetZoom = 2.5;
  targetCamX = g.x - cx;
  targetCamY = g.y - cy;
  currentView = 'galaxy';

  document.getElementById('btnBack').classList.remove('hidden');
  document.getElementById('viewTitle').textContent = g.name;
  document.getElementById('hintText').querySelector('span').textContent = '点击星球查看知识点详情';
  document.getElementById('bottomLegend').style.display = 'flex';
}

function navigateBack() {
  if (currentView === 'galaxy') {
    resetView();
  }
}

function resetView() {
  currentView = 'universe';
  currentGalaxyIdx = -1;
  currentStarSystemIdx = -1;
  hoveredPlanet = null;
  targetZoom = 0;
  targetCamX = 0;
  targetCamY = 0;
  document.getElementById('btnBack').classList.add('hidden');
  document.getElementById('viewTitle').textContent = '认知宇宙';
  document.getElementById('hintText').querySelector('span').textContent = '点击星系探索你的知识宇宙';
  document.getElementById('bottomLegend').style.display = 'flex';
  closePlanetModal();
}

// ═══════════════════════════════════
//  PLANET MODAL
// ═══════════════════════════════════
function openPlanetModal(planetData) {
  const { planet, starSystem, galaxy } = planetData;

  document.getElementById('modalPlanetDot').style.background = `radial-gradient(circle, ${planet.color}, ${planet.color}88)`;
  document.getElementById('modalPlanetDot').style.boxShadow = `0 0 20px ${planet.color}44`;
  document.getElementById('modalPlanetName').textContent = planet.name;
  document.getElementById('modalBreadcrumb').textContent = `${galaxy.name}  ›  ${starSystem.name}`;

  document.getElementById('modalBody').innerHTML = `
    <div class="section">
      <div class="section-label"><span class="label-icon">📝</span> 概述</div>
      <div class="section-content">${planet.summary}</div>
    </div>
    <div class="section">
      <div class="section-label"><span class="label-icon">🔍</span> 深度分析</div>
      <div class="section-content">${planet.analysis}</div>
    </div>
    <div class="insight-box">${planet.insight}</div>
    <div class="section">
      <div class="section-label"><span class="label-icon">💬</span> 原始记录</div>
      <div class="original-box">${planet.originalText}</div>
    </div>
    <div class="meta-row">
      <span class="meta-tag">🌌 ${galaxy.name}</span>
      <span class="meta-tag">☀️ ${starSystem.name}</span>
      <span class="meta-tag" style="background:${planet.color}22;border-color:${planet.color}33;color:${planet.color};">🪐 ${planet.name}</span>
    </div>
  `;

  document.getElementById('planetModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePlanetModal() {
  document.getElementById('planetModal').classList.remove('open');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════
function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;

  if (currentView === 'galaxy') {
    hoveredPlanet = findPlanetAt(mouseX, mouseY);
  }
}

function onCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (currentView === 'universe') {
    const gi = findGalaxyAt(mx, my);
    if (gi >= 0) {
      zoomToGalaxy(gi);
    }
  } else if (currentView === 'galaxy') {
    const found = findPlanetAt(mx, my);
    if (found) {
      openPlanetModal(found);
    } else {
      // Check if clicked outside galaxy area → go back
      const g = galaxies[currentGalaxyIdx];
      if (g && !isPointInCircle(mx, my, g.x, g.y, g.radius * 2)) {
        resetView();
      }
    }
  }
}

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = touch.clientX - rect.left;
    const my = touch.clientY - rect.top;
    mouseX = mx;
    mouseY = my;

    if (currentView === 'universe') {
      const gi = findGalaxyAt(mx, my);
      if (gi >= 0) zoomToGalaxy(gi);
    } else if (currentView === 'galaxy') {
      const found = findPlanetAt(mx, my);
      if (found) openPlanetModal(found);
    }
  }
}

// Close modal on ESC
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('planetModal').classList.contains('open')) {
      closePlanetModal();
    } else if (currentView === 'galaxy') {
      resetView();
    }
  }
});

// Close modal on overlay click
document.getElementById('planetModal').addEventListener('click', function(e) {
  if (e.target === this) closePlanetModal();
});

// ═══════════════════════════════════
//  AUTO-INIT IF ALREADY AUTHED
// ═══════════════════════════════════
if (sessionStorage.getItem(SESSION_KEY) === 'true') {
  document.getElementById('passwordOverlay').classList.add('hidden');
  document.getElementById('uiOverlay').classList.remove('hidden');
  init();
}

</script>
